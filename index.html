<!DOCTYPE html>
<html lang="en">
<head>
      <meta name="description" content="Compound Interest Calculator">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="Icons/icons8-investing-64.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Icons/icons8-investing-64.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Me</title>
  <style>
        html, body {
          height: 100%;
        }
    body {
      background: #f8fafc;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      background: #fff;
      border-radius: 0;
      box-shadow: 0 2px 12px 0 #0001;
      max-width: 400px;
      width: 95vw;
      margin: 0 auto 0 auto;
      padding: 1.2rem 0.7rem 1.2rem 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .row {
      display: flex;
      gap: 0.7em;
      align-items: flex-end;
    }
    .row > div {
      flex: 1;
      min-width: 0;
    }
    .small-input {
      max-width: 90px;
      display: inline-block;
    }
    .advanced-toggle {
      background: none;
      border: none;
      color: #2563eb;
      font-size: 1em;
      cursor: pointer;
      margin: 0.5em 0 0.2em 0;
      text-align: left;
      padding: 0;
    }
    .advanced-section {
      display: none;
      flex-direction: column;
      gap: 0.7em;
      margin-top: 0.2em;
    }
    .advanced-section.open {
      display: flex;
    }
    h1 {
      text-align: center;
      margin-top: 0.2em;
      margin-bottom: 0.2em;
    }
    .subtitle {
      text-align: center;
      color: #475569;
      margin-bottom: 1.2em;
      font-size: 1.05em;
    }
    label {
      font-weight: 500;
      margin-bottom: 0.2em;
      display: block;
    }
    .optional {
      font-size: 0.8em;
      color: #64748b;
      margin-left: 0.5em;
      font-weight: 400;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.1em 0.5em;
      background: #f1f5f9;
    }
    input, select {
      width: 100%;
      padding: 0.7em;
      margin-top: 0.2em;
      margin-bottom: 0.7em;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1em;
      background: #f9fafb;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 0.9em;
      background: #18181b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5em;
      transition: background 0.2s;
    }
    button:hover {
      background: #27272a;
    }
    .results {
      margin-top: 2em;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 1.2em;
      color: #18181b;
      font-size: 1.05em;
    }
    .results strong {
      display: block;
      margin-bottom: 0.3em;
    }
    @media (max-width: 500px) {
      .container {
        margin-top: 0;
        padding: 1.2rem 0.5rem 1.2rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Compound Me</h1>
    <div class="subtitle">Calculate how much your investments can grow over time.</div>
    <form id="calc-form" autocomplete="off">

      <label for="starting">Starting Investment ($)<span style="color:#ef4444">*</span></label>
      <input type="text" id="starting" required inputmode="decimal" pattern="[0-9,\.]*">

      <label for="contribution">Annual Contribution ($)</label>
      <input type="text" id="contribution" inputmode="decimal" pattern="[0-9,\.]*">

      <div class="row">
        <div>
          <label for="expense">Exp Ratio (%)</label>
          <input type="number" id="expense" class="small-input" min="0" step="any" placeholder="e.g. 0.09">
        </div>
        <div>
          <label for="aum">AUM Fee (%)</label>
          <input type="number" id="aum" class="small-input" min="0" step="any" placeholder="e.g. 1">
        </div>
        <div>
          <label for="inflation">Inflation (%)</label>
          <input type="number" id="inflation" class="small-input" min="0" step="any" placeholder="e.g. 2">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="return">Annual Return (%)<span style="color:#ef4444">*</span></label>
          <input type="number" id="return" required min="0" step="any" class="small-input">
        </div>
        <div>
          <label for="years">Number of Years<span style="color:#ef4444">*</span></label>
          <input type="number" id="years" required min="1" max="300" class="small-input">
        </div>
      </div>

      <label for="reinvest">Reinvest Dividends?</label>
      <select id="reinvest">
        <option value="yes" selected>Yes</option>
        <option value="no">No</option>
      </select>

      <button type="submit">Calculate</button>
    </form>
    <div id="results" class="results" style="display:none"></div>
    <div style="text-align:center;font-size:0.85em;color:#94a3b8;margin-top:2em;">
      App icon by <a href="https://icons8.com/icon/8n6z6pR9QFqC/investing" target="_blank" style="color:#2563eb;text-decoration:underline;">Icons8</a>
    </div>
  </div>
    <script>
    // ...existing code...
    // Auto-format input with commas for readability
    function addCommaFormatting(input) {
      input.addEventListener('input', function(e) {
        // Remove all commas
        let value = input.value.replace(/,/g, '');
        // Only allow digits and decimal
        if (!/^\d*(\.\d*)?$/.test(value)) {
          input.value = value.replace(/[^\d.]/g, '');
          return;
        }
        if (value === '') {
          input.value = '';
          return;
        }
        // Format integer part only
        let parts = value.split('.');
        let intPart = parts[0];
        let decPart = parts[1] !== undefined ? '.' + parts[1] : '';
        let formatted = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',') + decPart;
        // Save cursor position from right
        let posFromRight = input.value.length - input.selectionStart;
        input.value = formatted;
        // Restore cursor position
        let newPos = input.value.length - posFromRight;
        input.setSelectionRange(newPos, newPos);
      });
    }
    document.addEventListener('DOMContentLoaded', function() {
      addCommaFormatting(document.getElementById('starting'));
      addCommaFormatting(document.getElementById('contribution'));
    });
    function formatCurrency(n) {
      return n.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
    }
    function formatPercent(n, digits = 2) {
      return n.toFixed(digits) + '%';
    }
    function calculateCompound(params) {
      const {
        startingBalance,
        annualContribution,
        grossAnnualReturn,
        expenseRatio = 0,
        aumFee = 0,
        years,
        reinvestDividends,
        inflation = 0,
      } = params;
      const gross = grossAnnualReturn / 100;
      const expense = expenseRatio / 100;
      const aum = aumFee / 100;
      let effectiveAnnual = gross - expense - aum - (inflation / 100);
      effectiveAnnual = Math.max(effectiveAnnual, 0);
      const monthlyRate = Math.pow(1 + effectiveAnnual, 1 / 12) - 1;
      let balance = startingBalance;
      let totalContributions = startingBalance;
      let totalInterest = 0;
      for (let year = 1; year <= years; year++) {
        for (let month = 1; month <= 12; month++) {
          const interest = balance * monthlyRate;
          const monthlyContribution = annualContribution / 12;
          balance += interest + monthlyContribution;
          totalInterest += interest;
          totalContributions += monthlyContribution;
        }
      }
      return {
        finalBalance: balance,
        totalContributions,
        totalInterest,
        effectiveAnnual: effectiveAnnual * 100,
      };
    }
    document.getElementById('calc-form').onsubmit = function(e) {
      e.preventDefault();
      const startingBalance = parseFloat(document.getElementById('starting').value.replace(/,/g, '')) || 0;
      const annualContribution = parseFloat(document.getElementById('contribution').value.replace(/,/g, '')) || 0;
      const expenseRatio = parseFloat(document.getElementById('expense').value) || 0;
      const aumFee = parseFloat(document.getElementById('aum').value) || 0;
      const grossAnnualReturn = parseFloat(document.getElementById('return').value) || 0;
      const years = parseInt(document.getElementById('years').value, 10) || 0;
      const inflation = parseFloat(document.getElementById('inflation').value) || 0;
      const reinvestDividends = document.getElementById('reinvest').value === 'yes';
      if (!startingBalance || !grossAnnualReturn || !years) {
        alert('Please fill all required fields.');
        return;
      }
      const results = calculateCompound({
        startingBalance,
        annualContribution,
        grossAnnualReturn,
        expenseRatio,
        aumFee,
        years,
        reinvestDividends,
        inflation,
      });
      const resultsDiv = document.getElementById('results');
      // Calculate total fees lost
      const gross = grossAnnualReturn / 100;
      const expense = expenseRatio / 100;
      const aum = aumFee / 100;
      const effectiveAnnual = Math.max(gross - expense - aum - (inflation / 100), 0);
      // Simulate no-fee scenario
      let balanceNoFees = startingBalance;
      let balanceExpenseOnly = startingBalance;
      let balanceAumOnly = startingBalance;
      for (let year = 1; year <= years; year++) {
        for (let month = 1; month <= 12; month++) {
          const monthlyContribution = annualContribution / 12;
          // No fees
          const interestNoFees = balanceNoFees * (Math.pow(1 + gross, 1/12) - 1);
          balanceNoFees += interestNoFees + monthlyContribution;
          // Expense ratio only
          const interestExpenseOnly = balanceExpenseOnly * (Math.pow(1 + (gross - expense), 1/12) - 1);
          balanceExpenseOnly += interestExpenseOnly + monthlyContribution;
          // AUM only
          const interestAumOnly = balanceAumOnly * (Math.pow(1 + (gross - aum), 1/12) - 1);
          balanceAumOnly += interestAumOnly + monthlyContribution;
        }
      }
      const lostToExpense = balanceNoFees - balanceExpenseOnly;
      const lostToAum = balanceNoFees - balanceAumOnly;
      const feesLost = balanceNoFees - results.finalBalance;
      resultsDiv.innerHTML = `
        <div><strong>Total Contributions:</strong><span style="padding-left:10px;">${formatCurrency(results.totalContributions)}</span></div>
        <div style="margin-top:8px;"><strong>Total Interest Earned:</strong><span style="padding-left:10px;">${formatCurrency(results.totalInterest)}</span></div>
        <div style="margin-top:8px;"><strong>Final Balance:</strong><span style="padding-left:10px;">${formatCurrency(results.finalBalance)}</span></div>
        <div style="margin-top:0.7em;font-size:0.97em;color:#475569;">Over ${years} years at ${formatPercent(results.effectiveAnnual)} effective annual return.</div>
        <div style="font-size:0.97em;color:#64748b;margin-top:0.5em;">Lost to Exp Ratio: <strong>${formatCurrency(lostToExpense)}</strong></div>
        <div style="font-size:0.97em;color:#64748b;">Lost to AUM Fee: <strong>${formatCurrency(lostToAum)}</strong></div>
        <div style="font-size:0.97em;color:#64748b;">Total lost to fees: <strong>${formatCurrency(feesLost)}</strong></div>
      `;
      resultsDiv.style.display = 'block';
    };
  </script>
</body>
</html>
